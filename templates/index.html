<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detection Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-4">
        <h2 class="text-center text-primary mb-4">🧠 Fake News Detection</h2>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Enter News Text</label>
                <textarea name="news" class="form-control" rows="4" placeholder="Type or paste news here..."></textarea>
            </div>

            <div class="text-center mb-2">
                <b>OR</b>
            </div>

            <div class="mb-3">
                <label class="form-label">Upload News Image</label>
                <input type="file" name="image" class="form-control">
            </div>

            <button class="btn btn-success w-100">🔍 Analyze News</button>
        </form>
    </div>
    <!-- RESULT -->
    {% if result %}
    <div class="card mt-4 p-3 shadow">
        {% if result == "REAL" %}
            <h4 class="text-center text-success">Real ✅</h4>
        {% elif result == "FAKE" %}
            <h4 class="text-center text-danger">Fake ❌</h4>
        {% else %}
            <h4 class="text-center">{{ result }}</h4>
        {% endif %}

        <p class="text-center">
            <b>Confidence:</b> {{ '%.2f' % (confidence*100) }}%
        </p>

        <hr>

        <h5>📝 Extracted Text:</h5>
        <p class="text-muted">{{ text }}</p>
    </div>
    {% endif %}

    <!-- NAVIGATION -->
    <div class="text-center mt-4">
        <a href="/history" class="btn btn-info">📊 View History</a>
        <a href="/graph" class="btn btn-warning">📈 View Graph</a>
        <a href="/logout" class="btn btn-danger">🚪 Logout</a>
    </div>

</div>

</body>
</html>
