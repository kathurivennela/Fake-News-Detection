<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Fake News Detection</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Full-page background image */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url("{{ url_for('static', filename='bg1.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        /* Top right login modules */
        .top-right {
            position: absolute;
            top: 20px;
            right: 30px;
        }

        .top-right a {
            margin-left: 15px;
            color: #fff;
            font-weight: bold;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            background: rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .top-right a:hover {
            background: rgba(0,0,0,0.7);
        }
        /* Centered title */
        .center-title {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .center-title h1 {
            font-size: 3rem;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.7);
        }

        @media (max-width: 768px) {
            .center-title h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Top Right Login -->
    <div class="top-right">
        <a href="{{ url_for('user_login') }}">User Login</a>
        <a href="{{ url_for('admin_login') }}">Admin Login</a>
    </div>
    <!-- Centered Title -->
    <div class="center-title">
        <h1 style="font-size: 50px;">
        AUTOMATED FAKE NEWS DETECTION<BR>
        USING TRANSFORMER MODELS</h1>
    </div>

</body>
</html>
