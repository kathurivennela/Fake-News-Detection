<!DOCTYPE html>
<html>
<head>
    <title>History</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">📊 Prediction History</h2>

    <table class="table table-bordered table-striped shadow">
        <tr class="table-dark">
            
            <th>News</th>
            <th>Result</th>
            <th>Confidence</th>
        </tr>

        {% for row in data %}
        <tr>
            
            <td>{{ row[2] }}</td>
            <td>
                {% if row[3] == 'FAKE' %}
                        <span class="badge bg-danger">{{ row[3] }}</span>
                    {% else %}
                        <span class="badge bg-success">{{ row[3] }}</span>
                    {% endif %}
                </td>
            </td>
            <td>{{ '%.2f' % (row[4]*100) }}%</td>
        </tr>
        {% endfor %}
    </table>

    <div class="text-center">
        <a href="/index" class="btn btn-primary">⬅ Back</a>
    </div>

</div>

</body>
</html>
